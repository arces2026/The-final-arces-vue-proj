<div
  id="email-row"
  style="
    padding: 20px;
    border: 1px solid #ccc;
    background: #f9f9f9;
    cursor: pointer;
  "
>
  <strong>Oggetto: Riunione di progetto</strong> - Clicca qui per leggere il
  testo...

  <button id="delete-btn" style="float: right; background: red; color: white">
    Elimina
  </button>
</div>

<script>
  // Selezioniamo gli elementi del DOM
  const emailRow = document.getElementById("email-row");
  const deleteBtn = document.getElementById("delete-btn");

  // 1. Comportamento del div genitore (Apri l'email)
  emailRow.addEventListener("click", function () {
    alert("Apertura dell'email in corso...");
    // Qui andrebbe la logica per mostrare il corpo dell'email
  });

  // 2. Comportamento del pulsante figlio (Elimina)
  deleteBtn.addEventListener("click", function (event) {
    // Evita che il click "risalga" al div 'email-row'
    //event.stopPropagation();

    alert("Email eliminata con successo!");
    // Qui andrebbe la logica per rimuovere la riga dal database/interfaccia
  });
</script>
